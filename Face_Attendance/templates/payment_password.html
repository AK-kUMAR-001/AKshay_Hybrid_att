<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay - Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1120;--bg2:#101a33;--accent:#27f0d2;--muted:hsla(0,0%,100%,0.75);--card:rgba(255,255,255,0.08)}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Space Grotesk',system-ui;color:#eaf6f0;background:radial-gradient(1200px 600px at 10% 10%,#1b2a4a,transparent),linear-gradient(135deg,var(--bg),var(--bg2));min-height:100vh}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem}
    .nav a{color:var(--muted);text-decoration:none;margin-left:1rem}
    .center{display:flex;justify-content:center;align-items:center;min-height:65vh;padding:1rem}
    .panel{width:520px;background:var(--card);padding:2rem;border-radius:18px;box-shadow:0 20px 50px rgba(2,8,18,0.6)}
    .badge{padding:0.3rem 0.6rem;border-radius:999px;background:rgba(39,240,210,0.15);color:#7fffe7;font-size:0.85rem}
    .input{width:100%;margin:0.8rem 0 1rem 0;padding:1rem;border-radius:14px;border:1px solid rgba(255,255,255,0.18);background:transparent;color:#fff;font-size:1.2rem;letter-spacing:2px}
    .btn{margin-top:0.2rem;display:inline-block;padding:0.8rem 1.2rem;border-radius:12px;background:linear-gradient(90deg,var(--accent),#6bffdf);color:#03201a;text-decoration:none;border:0;font-weight:700;width:100%}
  </style>
</head>
<body>
  <div class="topbar">
    <div style="font-weight:700;">Confirm Payment</div>
    <div class="nav">
      <a href="{{ url_for('payment_reset') }}">Back</a>
      <a href="{{ url_for('index') }}">Out</a>
    </div>
  </div>

  <div class="center">
    <div class="panel">
      <div style="margin-bottom:0.6rem;">
        <span class="badge">{{ name }} ({{ student_id }})</span>
        <span class="badge">? {{ amount }}</span>
      </div>
      <form method="POST" action="{{ url_for('payment_confirm') }}">
        <input type="password" name="password" class="input" placeholder="Enter password" required>
        <button type="submit" class="btn">Pay Now</button>
      </form>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div style="margin-top:0.8rem;color:var(--accent);">
            {% for message in messages %}<small>{{ message }}</small><br>{% endfor %}
          </div>
        {% endif %}
      {% endwith %}
    </div>
  </div>
</body>
</html>
