<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay - Scan</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b1120;
      --bg2:#101a33;
      --accent:#27f0d2;
      --muted:hsla(0,0%,100%,0.75);
      --card:rgba(255,255,255,0.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Space Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, Arial;
      color:#eaf6f0;
      background: radial-gradient(1200px 600px at 10% 10%, #1b2a4a, transparent),
                  linear-gradient(135deg,var(--bg),var(--bg2));
      min-height:100vh;
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem}
    .brand{font-weight:700;letter-spacing:0.3px}
    .nav a{color:var(--muted);text-decoration:none;margin-left:1rem}

    .scan-wrap{display:flex;justify-content:center;align-items:center;min-height:70vh;padding:1rem}
    .scanner{
      width:420px;height:420px;border-radius:28px;background:var(--card);
      display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 20px 50px rgba(2,8,18,0.6)
    }
    .ring{
      width:320px;height:320px;border-radius:50%;border:3px solid rgba(39,240,210,0.25);
      position:relative;display:flex;align-items:center;justify-content:center
    }
    .ring:before{
      content:"";position:absolute;inset:12px;border-radius:50%;border:2px dashed rgba(39,240,210,0.35)
    }
    .pulse{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(39,240,210,0.25);animation:pulse 2s infinite}
    @keyframes pulse{0%{transform:scale(0.9);opacity:.2}50%{transform:scale(1);opacity:.6}100%{transform:scale(1.08);opacity:.1}}

    .cam{width:260px;height:260px;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,0.12);background:#050b16}
    .cam img{width:100%;height:100%;object-fit:cover;display:block}

    .sheet{
      position:fixed;left:0;right:0;bottom:0;background:rgba(10,16,30,0.95);
      border-top:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(10px);
      padding:1.2rem 1.5rem;box-shadow:0 -12px 30px rgba(0,0,0,0.45)
    }
    .sheet-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
    .btn{padding:0.7rem 1.1rem;border-radius:12px;border:1px solid rgba(255,255,255,0.2);color:#eaf6f0;text-decoration:none;font-weight:700}
    .btn.primary{background:linear-gradient(90deg,var(--accent),#6bffdf);color:#03201a;border:0}
    .status{color:var(--muted);margin:0.3rem 0 0 0}

    @media (max-width:700px){
      .scanner{width:340px;height:340px}
      .ring{width:250px;height:250px}
      .cam{width:200px;height:200px}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">SRI KRISHNA ADITYA COLLEGE OF ARTS AND SCIENCE</div>
    <div class="nav">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('attendance') }}">Attendance</a>
      <a href="{{ url_for('payment_reset') }}">Back</a>
      <a href="{{ url_for('index') }}">Out</a>
    </div>
  </div>

  <div class="scan-wrap">
    <div class="scanner">
      <div class="ring">
        <div class="pulse"></div>
        <div class="cam">
          <img src="{{ url_for('payment_video') }}" alt="QR Camera">
        </div>
      </div>
    </div>
  </div>

  <div class="sheet">
    <div class="sheet-row">
      <div>
        <div style="font-weight:700;">Scan QR to Pay</div>
        <div class="status" id="qrStatus">Waiting for QR...</div>
      </div>
      <div>
        <a href="{{ url_for('payment_start_camera') }}" class="btn primary">Open Camera</a>
        <a href="{{ url_for('payment_stop_camera') }}" class="btn">Close Camera</a>
      </div>
    </div>
  </div>

  <script>
    let lastId = null;
    async function pollQr() {
      try {
        const res = await fetch("{{ url_for('qr_status') }}", { cache: "no-store" });
        const data = await res.json();
        const statusEl = document.getElementById('qrStatus');
        if (data && data.id) {
          statusEl.textContent = `Detected: ${data.name || ''} (${data.id})`;
          if (data.id !== lastId) {
            lastId = data.id;
            const url = `{{ url_for('payment_amount') }}?sid=${encodeURIComponent(data.id)}&name=${encodeURIComponent(data.name || '')}`;
            window.location.href = url;
          }
        } else {
          statusEl.textContent = "Waiting for QR...";
        }
      } catch (e) {}
    }
    setInterval(pollQr, 800);
    pollQr();
  </script>
</body>
</html>
