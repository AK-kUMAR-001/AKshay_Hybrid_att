<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1120;--bg2:#101a33;--accent:#27f0d2;--muted:hsla(0,0%,100%,0.75);--card:rgba(255,255,255,0.08)}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Space Grotesk',system-ui;color:#eaf6f0;background:radial-gradient(1200px 600px at 10% 10%,#1b2a4a,transparent),linear-gradient(135deg,var(--bg),var(--bg2));min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{width:360px;background:var(--card);padding:2rem;border-radius:20px;box-shadow:0 20px 50px rgba(2,8,18,0.6);text-align:center}
    .ring{width:150px;height:150px;margin:0 auto 1rem auto;position:relative}
    .ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
    .count{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:700;color:#7fffe7}
    .badge{padding:0.25rem 0.6rem;border-radius:999px;background:rgba(39,240,210,0.15);color:#7fffe7;font-size:0.85rem}
    .btn{margin-top:1rem;display:inline-block;padding:0.8rem 1.2rem;border-radius:12px;background:linear-gradient(90deg,var(--accent),#6bffdf);color:#03201a;text-decoration:none;border:0;font-weight:700;width:100%}
    .done{display:none;font-size:1.4rem;font-weight:700;margin-top:0.4rem}
  </style>
</head>
<body>
  <div class="card">
    <div class="ring">
      <svg width="150" height="150">
        <circle cx="75" cy="75" r="65" stroke="rgba(39,240,210,0.2)" stroke-width="10" fill="none"></circle>
        <circle cx="75" cy="75" r="65" stroke="#27f0d2" stroke-width="10" fill="none" stroke-dasharray="408" stroke-dashoffset="408" id="ringStroke"></circle>
      </svg>
      <div class="count" id="countNum">3</div>
    </div>
    <div class="badge">{{ name }} ({{ student_id }})</div>
    <div class="badge">? {{ amount }}</div>
    <div class="done" id="done">Payment Successful</div>
    <a href="{{ url_for('index') }}" class="btn">Back to Home</a>
  </div>

  <script>
    let c = 3;
    const num = document.getElementById('countNum');
    const ring = document.getElementById('ringStroke');
    const done = document.getElementById('done');
    const total = 408;
    function tick(){
      ring.style.strokeDashoffset = total - ((3-c)/3)*total;
      num.textContent = c;
      if (c === 0){
        num.style.display = 'none';
        done.style.display = 'block';
        return;
      }
      c -= 1;
      setTimeout(tick, 1000);
    }
    tick();
  </script>
</body>
</html>
