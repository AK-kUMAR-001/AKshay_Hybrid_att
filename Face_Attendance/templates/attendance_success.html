<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Marked</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1120;--bg2:#101a33;--accent:#27f0d2;--muted:hsla(0,0%,100%,0.75);--card:rgba(255,255,255,0.08)}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Space Grotesk',system-ui;color:#eaf6f0;background:radial-gradient(1200px 600px at 10% 10%,#1b2a4a,transparent),linear-gradient(135deg,var(--bg),var(--bg2));min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{width:420px;background:var(--card);padding:2rem;border-radius:18px;box-shadow:0 20px 50px rgba(2,8,18,0.6);text-align:center}
    .badge{padding:0.25rem 0.6rem;border-radius:999px;background:rgba(39,240,210,0.15);color:#7fffe7;font-size:0.85rem}
    .title{font-size:1.5rem;font-weight:700;margin:0.6rem 0}
    .btn{margin-top:1rem;display:inline-block;padding:0.8rem 1.2rem;border-radius:12px;background:linear-gradient(90deg,var(--accent),#6bffdf);color:#03201a;text-decoration:none;border:0;font-weight:700;width:100%}
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Attendance Marked</div>
    <div class="title">{{ name }} ({{ student_id }})</div>
    <div class="badge">Source: {{ source }}</div>
    <a class="btn" href="{{ url_for('attendance') }}">Back to Attendance</a>
    <a class="btn" href="{{ url_for('index') }}" style="margin-top:0.6rem;">Home</a>
  </div>
</body>
</html>
